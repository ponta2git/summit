name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  static-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Prepare CI env
        run: cp .env.example .env.local

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Drizzle check
        run: pnpm db:check

      - name: Forbidden patterns
        run: pnpm verify:forbidden

  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare CI env
        run: cp .env.example .env.local

      - name: Migration drift check
        run: pnpm verify:drift

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: summit
          POSTGRES_PASSWORD: summit
          POSTGRES_DB: summit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # why: .env.example は localhost:5433 (開発者ローカルの compose port マッピング) を指すが、
      #   GHA の postgres service は container から 5432 で expose される。
      #   job-level env で明示上書きしないと .env.local の 5433 が優先されて接続失敗する。
      DATABASE_URL: postgres://summit:summit@localhost:5432/summit
      DIRECT_URL: postgres://summit:summit@localhost:5432/summit
      INTEGRATION_DB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare CI env
        run: cp .env.example .env.local

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Integration tests
        run: pnpm test:integration
