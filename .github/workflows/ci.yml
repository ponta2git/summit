name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  static-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout summit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: summit

      - name: Checkout momo-db
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ponta2git/momo-db
          path: momo-db

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          package_json_file: summit/package.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: summit/pnpm-lock.yaml

      - name: Install momo-db deps & build
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: momo-db

      - name: Install summit deps
        run: pnpm install --frozen-lockfile
        working-directory: summit

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Prepare CI env
        run: cp .env.example .env.local && cp summit.config.example.yml summit.config.yml
        working-directory: summit

      - name: Typecheck
        run: pnpm typecheck
        working-directory: summit

      - name: Lint
        run: pnpm lint
        working-directory: summit

      - name: Test
        run: pnpm test
        working-directory: summit

      - name: Build
        run: pnpm build
        working-directory: summit

      - name: Forbidden patterns
        run: pnpm verify:forbidden
        working-directory: summit

      - name: File size advisory
        run: pnpm verify:file-size
        working-directory: summit

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: summit
          POSTGRES_PASSWORD: summit
          POSTGRES_DB: summit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U summit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      # why: .env.example は localhost:5433 (開発者ローカルの compose port マッピング) を指すが、
      #   GHA の postgres service は container から 5432 で expose される。
      #   job-level env で明示上書きしないと .env.local の 5433 が優先されて接続失敗する。
      DATABASE_URL: postgres://summit:summit@localhost:5432/summit
      DIRECT_URL: postgres://summit:summit@localhost:5432/summit
      INTEGRATION_DB: "1"
    steps:
      - name: Checkout summit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: summit

      - name: Checkout momo-db
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ponta2git/momo-db
          path: momo-db

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          package_json_file: summit/package.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: summit/pnpm-lock.yaml

      - name: Install momo-db deps & build
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: momo-db

      - name: Install summit deps
        run: pnpm install --frozen-lockfile
        working-directory: summit

      - name: Prepare CI env
        run: cp .env.example .env.local && cp summit.config.example.yml summit.config.yml
        working-directory: summit

      - name: Apply migrations
        run: pnpm db:migrate
        working-directory: momo-db
        env:
          DIRECT_URL: postgres://summit:summit@localhost:5432/summit

      - name: Integration tests
        run: pnpm test:integration
        working-directory: summit
